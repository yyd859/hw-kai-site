<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HW-KAI — 硬件方案助手</title>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #22222e;
    --accent: #6c63ff;
    --accent2: #00d4ff;
    --accent-dim: rgba(108,99,255,0.15);
    --accent2-dim: rgba(0,212,255,0.1);
    --text: #e8e8f0;
    --text-dim: #888899;
    --border: rgba(108,99,255,0.2);
    --border2: rgba(255,255,255,0.06);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Layout ── */
  #app {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #chat-panel {
    display: flex;
    flex-direction: column;
    width: 420px;
    min-width: 320px;
    border-right: 1px solid var(--border2);
    background: var(--bg2);
  }

  #result-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Chat header ── */
  #chat-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border2);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 2px;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .msg-row.user {
    align-items: flex-end;
  }

  .msg-row.assistant {
    align-items: flex-start;
  }

  .bubble {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg-row.assistant .bubble {
    background: var(--accent-dim);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-row.user .bubble {
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  /* Options buttons */
  .options-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    max-width: 92%;
  }

  .option-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--accent2);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .option-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }

  /* Typing indicator */
  .typing-bubble {
    background: var(--accent-dim);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    border-radius: var(--radius);
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Confirmation card */
  .confirm-card {
    background: var(--bg3);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 14px 16px;
    max-width: 92%;
  }

  .confirm-card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  .confirm-card-body {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .confirm-card-desc {
    font-size: 14px;
    color: var(--text);
    background: var(--bg4);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    margin-bottom: 12px;
    white-space: pre-wrap;
  }

  .confirm-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-confirm {
    background: linear-gradient(135deg, var(--accent), #5548e0);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
    font-weight: 600;
  }

  .btn-confirm:hover { opacity: 0.85; }

  .btn-retry {
    background: var(--bg4);
    color: var(--text-dim);
    border: 1px solid var(--border2);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-retry:hover { color: var(--text); border-color: var(--border); }

  /* ── Input ── */
  #input-area {
    padding: 12px 14px;
    border-top: 1px solid var(--border2);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 9px 12px;
    resize: none;
    height: 40px;
    max-height: 100px;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
  }

  #user-input:focus {
    border-color: var(--accent);
  }

  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), #5548e0);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  #send-btn:hover { opacity: 0.85; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* ── Result panel ── */
  #result-header {
    padding: 18px 24px 0;
    border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }

  #result-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
    padding-bottom: 14px;
  }

  .tab-bar {
    display: flex;
    gap: 0;
  }

  .tab {
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
  }

  #result-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  #result-body::-webkit-scrollbar { width: 4px; }
  #result-body::-webkit-scrollbar-track { background: transparent; }
  #result-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .result-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  .result-placeholder .icon {
    font-size: 40px;
    opacity: 0.4;
  }

  .result-placeholder p {
    font-size: 14px;
    opacity: 0.6;
    max-width: 240px;
    line-height: 1.5;
  }

  /* BOM table */
  .bom-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .bom-table th {
    text-align: left;
    padding: 8px 10px;
    color: var(--text-dim);
    font-weight: 500;
    border-bottom: 1px solid var(--border2);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .bom-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border2);
    color: var(--text);
    vertical-align: top;
  }

  .bom-table tr:last-child td { border-bottom: none; }
  .bom-table tr:hover td { background: var(--bg3); }

  .bom-total {
    margin-top: 12px;
    text-align: right;
    font-size: 13px;
    color: var(--text-dim);
  }

  .bom-total span {
    color: var(--accent2);
    font-weight: 600;
  }

  /* Wiring table */
  .wiring-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .wiring-table th {
    text-align: left;
    padding: 8px 10px;
    color: var(--text-dim);
    font-weight: 500;
    border-bottom: 1px solid var(--border2);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .wiring-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border2);
    color: var(--text);
    vertical-align: top;
    font-family: monospace;
    font-size: 12px;
  }

  .wiring-table td:last-child {
    font-family: inherit;
    font-size: 13px;
    color: var(--text-dim);
  }

  .wiring-table tr:last-child td { border-bottom: none; }
  .wiring-table tr:hover td { background: var(--bg3); }

  .arrow { color: var(--accent); }

  /* Code block */
  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .code-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .copy-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { color: var(--text); border-color: var(--border); }
  .copy-btn.copied { color: var(--accent2); border-color: var(--accent2); }

  pre.code-block {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 16px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.6;
    color: #c8d4e0;
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    white-space: pre;
  }

  pre.code-block::-webkit-scrollbar { height: 4px; }
  pre.code-block::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Steps */
  .steps-section {
    margin-bottom: 20px;
  }

  .steps-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .step-item {
    display: flex;
    gap: 10px;
    margin-bottom: 8px;
    align-items: flex-start;
  }

  .step-num {
    width: 22px; height: 22px;
    background: var(--accent-dim);
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }

  .step-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  /* ── API status dot ── */
  #api-status {
    position: fixed;
    bottom: 14px;
    right: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
    z-index: 100;
    user-select: none;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }

  .status-dot.online { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .status-dot.offline { background: #555; }

  /* ── Generating spinner ── */
  .generating-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--accent2);
    padding: 4px 10px;
    background: var(--accent2-dim);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .spin {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,212,255,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    body { overflow: auto; }

    #app {
      flex-direction: column;
      height: auto;
      min-height: 100vh;
    }

    #chat-panel {
      width: 100%;
      min-width: unset;
      border-right: none;
      border-bottom: 1px solid var(--border2);
      height: 60vh;
      min-height: 400px;
    }

    #result-panel {
      height: 60vh;
      min-height: 360px;
    }
  }

  /* tag chips */
  .tag {
    display: inline-block;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: monospace;
  }

  .badge-mock {
    font-size: 10px;
    color: #f59e0b;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
  }
</style>
</head>
<body>

<div id="app">

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">
      <div class="logo-icon">⚙️</div>
      <div>
        <div class="logo-text">HW-KAI</div>
        <div class="logo-sub">硬件方案助手</div>
      </div>
    </div>

    <div id="messages"></div>

    <div id="input-area">
      <textarea id="user-input" placeholder="告诉我你想做什么…" rows="1"></textarea>
      <button id="send-btn" title="发送 (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Result Panel -->
  <div id="result-panel">
    <div id="result-header">
      <div id="result-title">方案详情</div>
      <div class="tab-bar" id="tab-bar" style="display:none">
        <div class="tab active" data-tab="bom">📦 BOM</div>
        <div class="tab" data-tab="wiring">🔌 接线</div>
        <div class="tab" data-tab="code">💻 代码</div>
        <div class="tab" data-tab="steps">📝 步骤</div>
      </div>
    </div>
    <div id="result-body">
      <div class="result-placeholder">
        <div class="icon">🔧</div>
        <p>确认方案后，这里会生成完整的硬件方案</p>
      </div>
    </div>
  </div>

</div>

<!-- API Status -->
<div id="api-status">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-label">检测中…</span>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const API_BASE = params.get('apiBase')
    || localStorage.getItem('hw_kai_api_base')
    || 'https://hw-kai-backend-842295210592.us-central1.run.app';

  const SESSION_ID = crypto.randomUUID();
  let currentSpec = null;
  let isTyping = false;
  let generatedData = null;

  // ── DOM refs ─────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusDot = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const tabBar = document.getElementById('tab-bar');
  const resultBody = document.getElementById('result-body');
  const resultTitle = document.getElementById('result-title');

  const TAB_DEFS = [
    { key: 'bom', label: '📦 BOM' },
    { key: 'wiring', label: '🔌 接线' },
    { key: 'code', label: '💻 代码' },
    { key: 'steps', label: '📝 步骤' }
  ];

  // ── API status check ─────────────────────────────────────────────────────
  async function checkApiStatus() {
    try {
      const r = await fetch(`${API_BASE}/health`, {
        signal: AbortSignal.timeout(3000)
      });

      if (!r.ok) throw new Error('not ok');
      statusDot.className = 'status-dot online';
      statusLabel.textContent = '在线';
    } catch {
      statusDot.className = 'status-dot offline';
      statusLabel.textContent = '离线';
    }
  }

  // ── Message helpers ───────────────────────────────────────────────────────
  function appendMessage(role, text, extra = {}) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = String(text || '');

    if (extra.isMock) {
      const badge = document.createElement('span');
      badge.className = 'badge-mock';
      badge.textContent = 'mock';
      bubble.appendChild(document.createTextNode(' '));
      bubble.appendChild(badge);
    }

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  function appendOptions(options, parentRow) {
    if (!Array.isArray(options) || options.length === 0) return;

    const optRow = document.createElement('div');
    optRow.className = 'options-row';

    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = String(opt);
      btn.addEventListener('click', () => {
        disableOptions(parentRow);
        sendMessage(String(opt));
      });
      optRow.appendChild(btn);
    });

    parentRow.appendChild(optRow);
    scrollBottom();
  }

  function disableOptions(row) {
    if (!row) return;
    row.querySelectorAll('.option-btn, .btn-confirm, .btn-retry').forEach(btn => {
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'default';
    });
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing-row';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function hideTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function appendConfirmCard(response) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';

    const confirmText = String(response?.options?.[0] || '确认，开始生成');
    const reviseText = String(response?.options?.[1] || '我再补充一下');
    const summary = getAssistantText(response) || '如果这版理解没问题，就可以继续生成。';

    const card = document.createElement('div');
    card.className = 'confirm-card';
    card.innerHTML = `
      <div class="confirm-card-title">🚀 可以继续生成</div>
      <div class="confirm-card-body">当前 runtime 已认为方案基本齐备。你可以直接确认继续，也可以先补充细节。</div>
      <div class="confirm-card-desc">${escHtml(summary)}</div>
      <div class="confirm-actions">
        <button class="btn-confirm">✅ ${escHtml(confirmText)}</button>
        <button class="btn-retry">✏️ ${escHtml(reviseText)}</button>
      </div>
    `;

    row.appendChild(card);
    messagesEl.appendChild(row);
    scrollBottom();

    const confirmBtn = card.querySelector('.btn-confirm');
    const reviseBtn = card.querySelector('.btn-retry');

    confirmBtn.addEventListener('click', () => {
      disableOptions(row);
      sendMessage(confirmText);
    });

    reviseBtn.addEventListener('click', () => {
      disableOptions(row);
      appendMessage('assistant', '好的，你可以继续补充需求、约束或偏好，我会按新的上下文继续推进。');
      inputEl.focus();
    });
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function getAssistantText(data) {
    return String(data?.message || data?.assistant_message || data?.error || '').trim();
  }

  function hasBuildOutput(payload) {
    if (!payload || typeof payload !== 'object') return false;
    return ['bom', 'wiring', 'code', 'instructions', 'recipe_label', 'hardware_plan'].some(key => key in payload);
  }

  function normalizeBuildOutput(data) {
    if (hasBuildOutput(data?.build_output)) return data.build_output;
    if (hasBuildOutput(data)) return data;
    return null;
  }

  function setResultPlaceholder(title = '方案详情', text = '继续对话后，这里会显示方案结果、缺口分析或错误信息。') {
    generatedData = null;
    tabBar.style.display = 'none';
    resultTitle.textContent = title;
    resultBody.innerHTML = `
      <div class="result-placeholder">
        <div class="icon">🔧</div>
        <p>${escHtml(text)}</p>
      </div>`;
  }

  function renderListSection(title, items, emptyText = '暂无') {
    const listItems = (Array.isArray(items) ? items : []).filter(Boolean);
    const body = listItems.length
      ? `<ul style="margin:8px 0 0 18px;line-height:1.7">${listItems.map(item => `<li>${escHtml(typeof item === 'string' ? item : JSON.stringify(item, null, 2))}</li>`).join('')}</ul>`
      : `<p style="color:var(--text-dim);font-size:13px;margin-top:8px">${escHtml(emptyText)}</p>`;

    return `
      <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:14px;">
        <div style="font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:4px">${escHtml(title)}</div>
        ${body}
      </div>`;
  }

  function renderSpecSnapshot(spec) {
    if (!spec || typeof spec !== 'object') return '';

    const summary = [];
    if (spec.project_brief) summary.push(`项目：${spec.project_brief}`);
    if (Array.isArray(spec.requirements) && spec.requirements.length) summary.push(`需求：${spec.requirements.join('；')}`);
    if (Array.isArray(spec.constraints) && spec.constraints.length) summary.push(`约束：${spec.constraints.join('；')}`);
    if (Array.isArray(spec.selected_module_ids) && spec.selected_module_ids.length) summary.push(`候选模块：${spec.selected_module_ids.join(', ')}`);
    if (spec.selected_board_id) summary.push(`板卡：${spec.selected_board_id}`);

    if (!summary.length) return '';

    return `
      <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-top:14px;">
        <div style="font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:8px">当前上下文</div>
        <div style="font-size:13px;line-height:1.7;color:var(--text)">${escHtml(summary.join('\n'))}</div>
      </div>`;
  }

  function renderGapAnalysis(data) {
    resultTitle.textContent = data?.error_type ? `缺口分析 · ${data.error_type}` : '缺口分析';
    tabBar.style.display = 'none';
    generatedData = null;

    const gap = data?.gap_analysis || {};
    resultBody.innerHTML = `
      <div style="margin-bottom:14px;padding:14px 16px;border-radius:12px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2)">
        <div style="font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:8px">当前还不能直接 build</div>
        <div style="font-size:14px;line-height:1.7;color:var(--text)">${escHtml(getAssistantText(data) || '后端返回了 gap handling 结果。')}</div>
      </div>
      ${renderListSection('已 resolve / 可落地部分', gap.resolved, '暂时没有已 resolve 的角色')}
      ${renderListSection('未 resolve / 缺口', gap.unresolved, '暂无明显缺口')}
      ${renderListSection('建议路径', gap.suggestions, '暂无建议')}
      ${renderSpecSnapshot(data?.current_spec)}
    `;
  }

  function renderErrorResult(data) {
    resultTitle.textContent = data?.error_type ? `运行错误 · ${data.error_type}` : '运行错误';
    tabBar.style.display = 'none';
    generatedData = null;

    const details = [];
    if (data?.error) details.push(`错误：${data.error}`);
    if (data?.error_type) details.push(`类型：${data.error_type}`);
    if (Array.isArray(data?.missing_components) && data.missing_components.length) {
      details.push(`缺失组件：${data.missing_components.join(', ')}`);
    }

    resultBody.innerHTML = `
      <div style="margin-bottom:14px;padding:14px 16px;border-radius:12px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2)">
        <div style="font-size:13px;font-weight:700;color:#f87171;margin-bottom:8px">后端返回错误</div>
        <div style="font-size:14px;line-height:1.7;color:var(--text)">${escHtml(getAssistantText(data) || '请求失败')}</div>
      </div>
      ${renderListSection('错误详情', details, '无更多细节')}
      ${renderSpecSnapshot(data?.current_spec)}
    `;
  }

  function updateTabs() {
    if (!generatedData) {
      tabBar.style.display = 'none';
      return;
    }

    tabBar.innerHTML = TAB_DEFS.map((tab, index) => `
      <div class="tab${index === 0 ? ' active' : ''}" data-tab="${tab.key}">${tab.label}</div>
    `).join('');
    tabBar.style.display = 'flex';
  }

  function renderBuildResult(payload) {
    generatedData = payload;
    resultTitle.textContent = payload.recipe_label || '方案详情';
    updateTabs();
    renderTab('bom');
  }

  function renderRuntimeResponse(data) {
    currentSpec = data?.current_spec || currentSpec;

    const buildOutput = normalizeBuildOutput(data);
    if (buildOutput) {
      renderBuildResult(buildOutput);
      return;
    }

    if (data?.gap_analysis) {
      renderGapAnalysis(data);
      return;
    }

    if (data?.error_type || data?.error) {
      renderErrorResult(data);
      return;
    }

    if (data?.ready_to_build || data?.is_ready_for_final) {
      resultTitle.textContent = '等待确认';
      resultBody.innerHTML = `
        <div class="result-placeholder">
          <div class="icon">✅</div>
          <p>runtime 认为当前上下文已经接近可生成。确认后会继续走 build。</p>
        </div>`;
      tabBar.style.display = 'none';
      generatedData = null;
      return;
    }

    if (!generatedData) {
      setResultPlaceholder('方案详情', '继续补充需求后，这里会显示生成结果、缺口分析或错误详情。');
    }
  }

  // ── Send ─────────────────────────────────────────────────────────────────
  async function sendMessage(text) {
    const trimmed = String(text || '').trim();
    if (!trimmed || isTyping) return;

    isTyping = true;
    sendBtn.disabled = true;

    appendMessage('user', trimmed);
    inputEl.value = '';
    autoResize();
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: SESSION_ID,
          message: trimmed,
          action: 'chat'
        }),
        signal: AbortSignal.timeout(30000)
      });

      const data = await res.json().catch(() => ({}));
      hideTyping();

      if (!res.ok) {
        const httpData = {
          ...data,
          message: getAssistantText(data) || `请求失败（HTTP ${res.status}）`,
          error: data?.error || `HTTP ${res.status}`,
          error_type: data?.error_type || `http_${res.status}`
        };
        appendMessage('assistant', `⚠️ ${getAssistantText(httpData)}`);
        renderRuntimeResponse(httpData);
        return;
      }

      const assistantText = getAssistantText(data) || '后端返回了空消息。';
      const isMock = data.intent_source === 'mock';
      const msgRow = appendMessage('assistant', assistantText, { isMock });

      renderRuntimeResponse(data);

      if (normalizeBuildOutput(data)) {
        appendMessage('assistant', '✅ 已收到 build_output，右侧可以查看 BOM、接线、代码和步骤。');
      } else if (data?.ready_to_build || data?.is_ready_for_final) {
        appendConfirmCard(data);
      } else if (Array.isArray(data?.options) && data.options.length) {
        appendOptions(data.options, msgRow);
      }
    } catch (err) {
      hideTyping();
      const errMsg = err?.name === 'TimeoutError'
        ? '请求超时，请检查后端是否在线'
        : `出了点问题：${err?.message || err}`;
      const errorData = { message: errMsg, error: errMsg, error_type: err?.name || 'request_failed' };
      appendMessage('assistant', `⚠️ ${errMsg}`);
      renderErrorResult(errorData);
    } finally {
      isTyping = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Generate fallback ────────────────────────────────────────────────────
  async function doGenerate(spec) {
    if (!spec) return;

    resultTitle.textContent = '生成中…';
    tabBar.style.display = 'none';
    resultBody.innerHTML = `
      <div class="result-placeholder">
        <div class="generating-badge"><div class="spin"></div>正在生成硬件方案…</div>
        <p style="color:var(--text-dim);font-size:13px">这可能需要几秒钟</p>
      </div>`;

    try {
      const res = await fetch(`${API_BASE}/api/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: SESSION_ID, spec }),
        signal: AbortSignal.timeout(60000)
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        renderRuntimeResponse({
          ...data,
          message: getAssistantText(data) || `生成失败（HTTP ${res.status}）`,
          error: data?.error || `HTTP ${res.status}`,
          error_type: data?.error_type || `http_${res.status}`
        });
        return;
      }

      renderRuntimeResponse(data);
      appendMessage('assistant', '✅ 方案已生成，右侧可查看详细内容。');
    } catch (err) {
      renderErrorResult({
        message: err?.name === 'TimeoutError' ? '生成超时，请稍后重试。' : `生成失败：${err?.message || err}`,
        error: err?.message || String(err),
        error_type: err?.name || 'generate_failed'
      });
      appendMessage('assistant', `⚠️ 生成方案时出了问题：${err?.message || err}`);
    }
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  tabBar.addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab || !generatedData) return;
    tabBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderTab(tab.dataset.tab);
  });

  function renderTab(name) {
    if (!generatedData) return;
    const d = generatedData;

    if (name === 'bom') {
      const rows = (Array.isArray(d.bom) ? d.bom : []).map(item => `
        <tr>
          <td>${escHtml(item?.name || item?.component || '')}</td>
          <td>${escHtml(item?.qty || item?.quantity || 1)}</td>
          <td>${escHtml(item?.unit_price_cny || item?.price || '')}</td>
          <td>${escHtml(item?.note || item?.description || '')}</td>
        </tr>`).join('');

      resultBody.innerHTML = rows ? `
        <table class="bom-table">
          <thead><tr><th>名称</th><th>数量</th><th>单价(¥)</th><th>备注</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="bom-total">总计：<span>¥${escHtml(d.bom_total_cny || 0)}</span></div>` :
        '<p style="color:var(--text-dim);font-size:13px">暂无 BOM 数据</p>';
      return;
    }

    if (name === 'wiring') {
      const rows = (Array.isArray(d.wiring) ? d.wiring : []).map(w => `
        <tr>
          <td>${escHtml(w?.from || '')}</td>
          <td class="arrow">→</td>
          <td>${escHtml(w?.to || '')}</td>
          <td>${escHtml(w?.note || w?.description || '')}</td>
        </tr>`).join('');

      resultBody.innerHTML = rows ? `
        <table class="wiring-table">
          <thead><tr><th>From</th><th></th><th>To</th><th>说明</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>` :
        '<p style="color:var(--text-dim);font-size:13px">暂无接线数据</p>';
      return;
    }

    if (name === 'code') {
      const code = String(d.code || '// 暂无代码');
      resultBody.innerHTML = `
        <div class="code-header">
          <span class="code-label">${escHtml(d?.board?.name || d?.board?.id || 'Code')}</span>
          <button class="copy-btn" id="copy-code-btn">📋 复制</button>
        </div>
        <pre class="code-block">${escHtml(code)}</pre>`;

      document.getElementById('copy-code-btn').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(code);
          const btn = document.getElementById('copy-code-btn');
          btn.textContent = '✅ 已复制';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '📋 复制';
            btn.classList.remove('copied');
          }, 2000);
        } catch {
          alert('复制失败，请手动选择代码');
        }
      });
      return;
    }

    if (name === 'steps') {
      const inst = d.instructions || {};
      const assembly = Array.isArray(inst.assembly) ? inst.assembly : Array.isArray(inst) ? inst : [];
      const upload = Array.isArray(inst.upload) ? inst.upload : [];
      const validationWarnings = Array.isArray(d?.validation?.warnings) ? d.validation.warnings : [];

      const makeSteps = arr => arr.map((s, i) => `
        <div class="step-item">
          <div class="step-num">${i + 1}</div>
          <div class="step-text">${escHtml(s)}</div>
        </div>`).join('');

      let html = '';
      if (assembly.length) {
        html += `<div class="steps-section"><div class="steps-section-title">🔧 组装步骤</div>${makeSteps(assembly)}</div>`;
      }
      if (upload.length) {
        html += `<div class="steps-section"><div class="steps-section-title">💾 烧录步骤</div>${makeSteps(upload)}</div>`;
      }
      if (validationWarnings.length) {
        html += `<div class="steps-section"><div class="steps-section-title">⚠️ 提示</div>${makeSteps(validationWarnings)}</div>`;
      }
      if (!html) {
        html = '<p style="color:var(--text-dim);font-size:13px">暂无步骤信息</p>';
      }
      resultBody.innerHTML = html;
    }
  }

  // ── Input handling ────────────────────────────────────────────────────────
  function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  }

  inputEl.addEventListener('input', autoResize);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(inputEl.value);
    }
  });

  sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

  // ── Init ──────────────────────────────────────────────────────────────────
  function init() {
    appendMessage(
      'assistant',
      '你好！我是 HW-KAI。现在这个页面已经按 mvp0.2 runtime 的节奏工作：我会直接显示后端返回的 message / assistant_message，并在右侧展示生成结果、缺口分析或错误信息。\n\n告诉我你想做什么，例如：\n• 做一个按钮触发会发光的装置\n• 做一个自动浇花系统\n• 做一个门开了会提醒我的东西'
    );

    setResultPlaceholder();
    checkApiStatus();
    setInterval(checkApiStatus, 30000);
    inputEl.focus();
  }

  window.hwKaiGenerate = doGenerate;
  init();
</script>
</body>
</html>
