<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2540"/>
      <stop offset="100%" stop-color="#061830"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5ef0e8"/>
      <stop offset="100%" stop-color="#00b8c4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="48" height="48" rx="6" fill="url(#bg)"/>

  <!-- KAI 文字 路径 -->
  <g fill="url(#teal)" filter="url(#glow)">
    <!-- K: 竖 -->
    <rect x="3" y="10" width="4" height="28" rx="1.5"/>
    <!-- K: 上斜 -->
    <polygon points="7,24 15.5,10 20,10 11.5,24"/>
    <!-- K: 下斜 -->
    <polygon points="7,24 15.5,38 20,38 11.5,24"/>

    <!-- A: 左斜 -->
    <polygon points="22,38 25,38 29.5,10 26.5,10"/>
    <!-- A: 右斜 -->
    <polygon points="29.5,10 32.5,10 36,38 33,38"/>
    <!-- A: 横 -->
    <rect x="24.5" y="27" width="9" height="3" rx="1"/>

    <!-- I: 竖 -->
    <rect x="38.5" y="10" width="4" height="28" rx="1.5"/>
    <!-- I: 顶横 -->
    <rect x="36.5" y="10" width="8" height="3" rx="1"/>
    <!-- I: 底横 -->
    <rect x="36.5" y="35" width="8" height="3" rx="1"/>
  </g>
</svg>
